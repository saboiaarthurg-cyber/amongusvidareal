<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Task Hunt</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    button { width: 100%; padding: 20px; margin: 12px 0; font-size: 18px; border: none; border-radius: 12px; background: #6200ee; color: white; }
    .card { background: #1e1e1e; padding: 20px; margin: 15px 0; border-radius: 12px; }
    .task { padding: 15px; background: #252525; margin: 10px 0; border-radius: 8px; cursor: pointer; }
    .timer { font-size: 60px; text-align: center; margin: 30px 0; font-weight: bold; color: #ffeb3b; }
    .progress { height: 8px; background: #333; margin: 15px 0; border-radius: 4px; overflow: hidden; }
    .progress-bar { height: 100%; background: #4caf50; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCN1GHPqTbG_8d4YiSMZ0Wu-BQMWdVeFIA",
      authDomain: "amonguvire.firebaseapp.com",
      projectId: "amonguvire",
      storageBucket: "amonguvire.firebasestorage.app",
      messagingSenderId: "803409140628",
      appId: "1:803409140628:web:80fa0e598e06ce438f4d81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentGameId = null;
    let currentPlayerName = "";
    let isAdminUser = false;
    let timerInterval = null;
    let currentTask = null;
    let html5QrCode = null;

    function showHome() {
      document.getElementById('app').innerHTML = `
        <h1 style="text-align:center">QR Task Hunt</h1>
        <button onclick="startAsAdmin()">Sou o Organizador</button>
        <button onclick="joinAsPlayer()">Sou Jogador</button>
      `;
    }

    async function startAsAdmin() {
      isAdminUser = true;
      currentGameId = "sala-" + Math.floor(100000 + Math.random() * 900000);
      
      await db.collection('games').doc(currentGameId).set({
        name: "Partida Presencial",
        status: "waiting",
        tasksPerPlayer: 5,
        createdAt: new Date().toISOString()
      });

      alert("✅ Sala criada com sucesso!\nCódigo: " + currentGameId);
      showAdminPanel();
    }

    function showAdminPanel() {
      document.getElementById('app').innerHTML = `
        <h2>Organizador - ${currentGameId}</h2>
        <div class="card">
          <button onclick="alert('Cadastro de tarefas + QR Codes em breve')">Cadastrar Tarefas e QR Codes</button>
          <button onclick="startGameForPlayers()">Iniciar Partida</button>
          <button onclick="endGameByAdmin()">Encerrar Partida</button>
        </div>
        <button onclick="showHome()">Voltar</button>
      `;
    }

    function startGameForPlayers() {
      alert("Partida iniciada! Os jogadores receberam suas tarefas.");
    }

    function endGameByAdmin() {
      if (confirm("Encerrar a partida agora?")) {
        alert("O organizador encerrou a partida.");
        showFinalScreen("O organizador encerrou a partida.");
      }
    }

    function joinAsPlayer() {
      const code = prompt("Digite o código da sala:");
      if (!code) return;
      currentGameId = code;
      currentPlayerName = prompt("Seu nome:", "Jogador");
      if (currentPlayerName) showPlayerPanel();
    }

    function showPlayerPanel() {
      document.getElementById('app').innerHTML = `
        <h2>${currentPlayerName}</h2>
        <p class="status">Sala: ${currentGameId} | 0/5</p>
        <div class="card">
          <h3>Suas Tarefas</h3>
          <div class="task" onclick="selectTask('Biblioteca', 20)">Biblioteca</div>
          <div class="task" onclick="selectTask('Laboratório', 30)">Laboratório</div>
          <div class="task" onclick="selectTask('Recepção', 25)">Recepção</div>
        </div>
        <button onclick="startQRScanner()">ESCANEAR QR CODE</button>
      `;
    }

    function selectTask(name, duration) {
      currentTask = {name, duration};
      let timeLeft = duration;
      let progress = 100;

      document.getElementById('app').innerHTML = `
        <h2>${currentTask.name}</h2>
        <div class="timer" id="timer">${timeLeft}</div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width:100%"></div></div>
        <button onclick="applyPenalty()">Não encontrei o QR Code (+10s)</button>
        <button onclick="showPlayerPanel()">Voltar</button>
      `;

      timerInterval = setInterval(() => {
        timeLeft--;
        progress = (timeLeft / currentTask.duration) * 100;
        document.getElementById('timer').textContent = timeLeft;
        document.getElementById('progressBar').style.width = progress + '%';
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          alert("✅ Tarefa concluída com sucesso!");
          showPlayerPanel();
        }
      }, 1000);
    }

    function applyPenalty() {
      if (confirm("Aplicar +10 segundos de penalidade?")) {
        clearInterval(timerInterval);
        currentTask.duration += 10;
        selectTask(currentTask.name, currentTask.duration);
      }
    }

    function startQRScanner() {
      document.getElementById('app').innerHTML = `
        <h2>Escaneando QR Code...</h2>
        <div id="reader" style="width:100%;"></div>
        <button onclick="stopScanner()">Cancelar</button>
      `;

      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({facingMode: "environment"}, {fps:10, qrbox:{width:250,height:250}}, (decodedText) => {
        html5QrCode.stop();
        alert("QR Code lido: " + decodedText + "\n\nTarefa identificada!");
        selectTask(decodedText || "Biblioteca", 30);
      }).catch(() => alert("Erro ao abrir câmera"));
    }

    function stopScanner() {
      if (html5QrCode) html5QrCode.stop();
      showPlayerPanel();
    }

    function showFinalScreen(message) {
      document.getElementById('app').innerHTML = `
        <h2>Partida Finalizada</h2>
        <div class="card">
          <p>${message}</p>
        </div>
        <button onclick="showHome()">Jogar Novamente</button>
      `;
    }

    showHome();
  </script>
</body>
</html>
