<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Task Hunt</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    button { width: 100%; padding: 20px; margin: 12px 0; font-size: 18px; border: none; border-radius: 12px; background: #6200ee; color: white; }
    .card { background: #1e1e1e; padding: 20px; margin: 15px 0; border-radius: 12px; }
    .task { padding: 15px; background: #252525; margin: 10px 0; border-radius: 8px; cursor: pointer; }
    .timer { font-size: 60px; text-align: center; margin: 30px 0; font-weight: bold; color: #ffeb3b; }
    .status { font-size: 14px; text-align: center; margin: 10px 0; color: #aaa; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCN1GHPqTbG_8d4YiSMZ0Wu-BQMWdVeFIA",
      authDomain: "amonguvire.firebaseapp.com",
      projectId: "amonguvire",
      storageBucket: "amonguvire.firebasestorage.app",
      messagingSenderId: "803409140628",
      appId: "1:803409140628:web:80fa0e598e06ce438f4d81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentGameId = null;
    let currentPlayerName = "";
    let isAdminUser = false;
    let timerInterval = null;
    let currentTask = null;
    let html5QrCode = null;
    let playerTasks = [];

    function showHome() {
      document.getElementById('app').innerHTML = `
        <h1 style="text-align:center; margin-bottom:40px">QR Task Hunt</h1>
        <button onclick="startAsAdmin()">Sou o Organizador</button>
        <button onclick="joinAsPlayer()">Sou Jogador</button>
      `;
    }

    async function startAsAdmin() {
      isAdminUser = true;
      currentGameId = "sala-" + Math.floor(100000 + Math.random() * 900000);
      
      await db.collection('games').doc(currentGameId).set({
        name: "Partida Presencial",
        status: "waiting",
        tasksPerPlayer: 5,
        createdAt: new Date().toISOString()
      });

      alert("Sala criada!\nCódigo: " + currentGameId);
      showAdminPanel();
    }

    function showAdminPanel() {
      document.getElementById('app').innerHTML = `
        <h2>Organizador - ${currentGameId}</h2>
        <div class="card">
          <button onclick="registerTasks()">Cadastrar Tarefas e QR Codes</button>
          <button onclick="startGame()">Iniciar Partida</button>
          <button onclick="endGame()">Encerrar Partida</button>
        </div>
        <button onclick="showHome()">Voltar</button>
      `;
    }

    function registerTasks() {
      alert("Em breve: Cadastro completo de tarefas e QR Codes");
    }

    function startGame() {
      alert("Partida iniciada! Os jogadores já receberam suas tarefas.");
    }

    function endGame() {
      if (confirm("Encerrar agora?")) {
        showRanking();
      }
    }

    function showRanking() {
      document.getElementById('app').innerHTML = `
        <h2>Partida Encerrada</h2>
        <div class="card">
          <h3>Ranking</h3>
          <p>1º - ${currentPlayerName || "Jogador1"} - 5 tarefas</p>
          <p>2º - Jogador2 - 4 tarefas</p>
          <p>3º - Jogador3 - 3 tarefas</p>
        </div>
        <button onclick="showHome()">Nova Partida</button>
      `;
    }

    function joinAsPlayer() {
      isAdminUser = false;
      const code = prompt("Digite o código da sala:");
      if (!code) return;
      currentGameId = code;
      currentPlayerName = prompt("Seu nome:", "Jogador");
      if (currentPlayerName) {
        playerTasks = [
          {id:1, name:"Biblioteca", location:"Prédio A", status:"pending", duration:20},
          {id:2, name:"Laboratório", location:"Prédio B", status:"pending", duration:30},
          {id:3, name:"Recepção", location:"Entrada", status:"pending", duration:25}
        ];
        showPlayerPanel();
      }
    }

    function showPlayerPanel() {
      let tasksHTML = playerTasks.map(t => `
        <div class="task" onclick="selectTask(${t.id})">
          ${t.status === 'completed' ? '✓' : '□'} ${t.name} - ${t.location}
        </div>
      `).join('');

      document.getElementById('app').innerHTML = `
        <h2>${currentPlayerName}</h2>
        <p class="status">Sala: ${currentGameId} | Concluídas: 0/${playerTasks.length}</p>
        <div class="card">
          <h3>Suas Tarefas</h3>
          ${tasksHTML}
        </div>
        <button onclick="startQRScanner()">ESCANEAR QR CODE</button>
        <button onclick="showHome()">Sair</button>
      `;
    }

    function selectTask(id) {
      currentTask = playerTasks.find(t => t.id === id);
      if (currentTask) startTaskTimer();
    }

    function startTaskTimer() {
      let timeLeft = currentTask.duration;
      document.getElementById('app').innerHTML = `
        <h2>${currentTask.name}</h2>
        <p>Local: ${currentTask.location}</p>
        <div class="timer" id="timer">${timeLeft}</div>
        <button onclick="applyPenalty()">Não encontrei o QR Code (+10s)</button>
        <button onclick="showPlayerPanel()">Voltar</button>
      `;

      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          currentTask.status = 'completed';
          alert("Tarefa concluída!");
          showPlayerPanel();
        }
      }, 1000);
    }

    function applyPenalty() {
      if (confirm("Adicionar 10 segundos?")) {
        clearInterval(timerInterval);
        currentTask.duration += 10;
        startTaskTimer();
      }
    }

    function startQRScanner() {
      document.getElementById('app').innerHTML = `
        <h2>Escaneando QR Code...</h2>
        <div id="reader" style="width:100%;"></div>
        <button onclick="stopScanner()">Cancelar</button>
      `;

      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({facingMode: "environment"}, {fps:10, qrbox:{width:250,height:250}}, (text) => {
        html5QrCode.stop();
        alert("QR lido! Abrindo tarefa...");
        if (playerTasks.length > 0) selectTask(playerTasks[0].id);
      }).catch(() => alert("Erro na câmera"));
    }

    function stopScanner() {
      if (html5QrCode) html5QrCode.stop();
      showPlayerPanel();
    }

    showHome();
  </script>
</body>
</html>
