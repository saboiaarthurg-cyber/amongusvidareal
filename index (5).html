<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F1216">
<title>Amonguvire — Console de Missão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1216;
    --surface:#171B21;
    --surface-2:#20252D;
    --border:#2B313B;
    --border-soft:#232833;
    --text:#ECE9E2;
    --text-muted:#8B93A1;
    --accent:#F2A93B;
    --accent-dim:#8A6A2E;
    --ok:#3ECF8E;
    --danger:#E2554A;
    --info:#5B8DEF;
    --radius:10px;
    --radius-sm:6px;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
    background-image:
      radial-gradient(ellipse at top left, rgba(242,169,59,0.06), transparent 45%),
      radial-gradient(ellipse at bottom right, rgba(91,141,239,0.05), transparent 50%);
    background-attachment:fixed;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:20px 18px 40px;
  }
  h1,h2,h3{font-family:var(--font-display);margin:0;letter-spacing:0.2px;}
  p{margin:0;color:var(--text-muted);line-height:1.5;}
  .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:6px;
    display:flex;align-items:center;gap:8px;
  }
  .eyebrow::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .header-block{margin-bottom:28px;}
  .header-block h1{font-size:26px;}
  .header-block h2{font-size:20px;}
  .card{
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
  }
  .card + .card{margin-top:0;}
  .stack{display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  label{
    display:block;
    font-family:var(--font-mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.2px;
    color:var(--text-muted);
    margin-bottom:7px;
  }
  input, select, textarea{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:var(--radius-sm);
    padding:14px 12px;
    font-size:16px;
    font-family:var(--font-body);
    outline:none;
    transition:border-color .15s;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--accent);}
  input::placeholder{color:#5A6270;}
  .field{margin-bottom:14px;}
  .field:last-child{margin-bottom:0;}
  button{
    font-family:var(--font-body);
    font-weight:600;
    font-size:16px;
    border:none;
    border-radius:var(--radius-sm);
    padding:16px 18px;
    cursor:pointer;
    min-height:54px;
    transition:transform .08s ease, filter .15s;
    -webkit-tap-highlight-color:transparent;
  }
  button:active{transform:scale(0.98);}
  .btn-primary{background:var(--accent);color:#181205;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-primary:disabled{background:#4A4128;color:#7c7358;cursor:not-allowed;}
  .btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{border-color:var(--accent);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(226,85,74,0.4);}
  .btn-danger:hover{background:rgba(226,85,74,0.08);}
  .btn-ghost{background:transparent;color:var(--text-muted);border:1px solid transparent;padding:10px 12px;min-height:auto;font-size:14px;}
  .btn-block{width:100%;}
  .btn-row{display:flex;gap:10px;}
  .muted{color:var(--text-muted);font-size:14px;}
  .error-msg{color:var(--danger);font-size:13px;margin-top:8px;font-family:var(--font-mono);}
  .code-display{
    font-family:var(--font-mono);
    font-size:34px;
    font-weight:700;
    letter-spacing:6px;
    color:var(--accent);
    text-align:center;
    padding:18px 0;
  }
  .home-actions{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
  .role-btn{
    text-align:left;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:var(--radius);
    padding:20px;
    display:flex;
    align-items:center;
    gap:16px;
    color:var(--text);
  }
  .role-btn:hover{border-color:var(--accent);}
  .role-icon{
    width:42px;height:42px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;flex-shrink:0;
    background:var(--surface-2);
  }
  .role-btn .role-title{font-family:var(--font-display);font-size:17px;font-weight:600;margin-bottom:2px;}
  .task-item{
    display:flex;align-items:center;gap:12px;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .task-item.done{opacity:0.55;}
  .task-item.active-task{border-color:var(--accent);}
  .task-check{
    width:26px;height:26px;border-radius:6px;flex-shrink:0;
    border:2px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
  }
  .task-check.done{background:var(--ok);border-color:var(--ok);color:#0e2318;}
  .task-check.active{border-color:var(--accent);color:var(--accent);}
  .task-name{font-weight:600;font-size:15px;}
  .task-loc{font-size:12.5px;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px;}
  .status-pill{
    margin-left:auto;font-family:var(--font-mono);font-size:10px;
    text-transform:uppercase;letter-spacing:1px;
    padding:4px 8px;border-radius:20px;flex-shrink:0;
  }
  .pill-wait{background:rgba(139,147,161,0.15);color:var(--text-muted);}
  .pill-progress{background:rgba(242,169,59,0.15);color:var(--accent);}
  .pill-done{background:rgba(62,207,142,0.15);color:var(--ok);}
  .stat-grid{display:flex;gap:10px;margin-bottom:18px;}
  .stat-box{
    flex:1;background:var(--surface);border:1px solid var(--border-soft);
    border-radius:var(--radius);padding:14px;text-align:center;
  }
  .stat-num{font-family:var(--font-display);font-size:24px;font-weight:700;}
  .stat-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-top:2px;}
  #reader{width:100%;border-radius:var(--radius);overflow:hidden;background:#000;}
  #reader video{border-radius:var(--radius);}
  .scan-frame{
    position:relative;margin-bottom:16px;
  }
  .timer-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0 6px;}
  .timer-ring{position:relative;width:220px;height:220px;}
  .timer-ring svg{transform:rotate(-90deg);width:100%;height:100%;}
  .timer-ring .bg-ring{fill:none;stroke:var(--surface-2);stroke-width:10;}
  .timer-ring .fg-ring{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .25s linear;}
  .timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .timer-num{font-family:var(--font-mono);font-size:40px;font-weight:700;}
  .timer-sub{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}
  .divider{height:1px;background:var(--border-soft);margin:18px 0;}
  .tag{
    display:inline-flex;align-items:center;font-family:var(--font-mono);
    font-size:10.5px;text-transform:uppercase;letter-spacing:1px;
    padding:3px 8px;border-radius:20px;background:var(--surface-2);color:var(--text-muted);
  }
  .qr-card{
    background:#fff;border-radius:var(--radius);padding:14px;
    display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:12px;
  }
  .qr-card canvas{display:block;}
  .qr-card .qr-label{color:#111;font-family:var(--font-mono);font-weight:700;font-size:13px;text-align:center;}
  .rank-row{
    display:flex;align-items:center;gap:12px;padding:12px 14px;
    background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);margin-bottom:8px;
  }
  .rank-row.me{border-color:var(--accent);}
  .rank-pos{font-family:var(--font-mono);font-weight:700;color:var(--text-muted);width:24px;}
  .rank-row.pos-1 .rank-pos{color:var(--accent);}
  .top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .back-link{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);background:none;border:none;padding:8px 0;min-height:auto;cursor:pointer;}
  .back-link:active{transform:none;}
  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:12px 18px;border-radius:var(--radius);font-size:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:999;max-width:90%;text-align:center;
  }
  .toast.danger{border-color:rgba(226,85,74,0.5);color:#ffb3ad;}
  .toast.ok{border-color:rgba(62,207,142,0.5);color:#b6f5d8;}
  .spinner{
    width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.2);
    border-top-color:var(--accent);animation:spin .7s linear infinite;display:inline-block;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty-state{text-align:center;padding:40px 10px;color:var(--text-muted);}
  .empty-state .big-emoji{font-size:34px;margin-bottom:10px;}
  .task-bank-row{
    display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);
    border:1px solid var(--border-soft);border-radius:var(--radius);margin-bottom:8px;
  }
  .task-bank-row .tbr-name{font-weight:600;font-size:14.5px;}
  .task-bank-row .tbr-meta{font-family:var(--font-mono);font-size:11.5px;color:var(--text-muted);margin-top:2px;}
  .icon-btn{
    background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);
    min-height:auto;padding:8px 10px;font-size:13px;border-radius:var(--radius-sm);
  }
  .waiting-pulse{
    width:14px;height:14px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 0 rgba(242,169,59,0.6);animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(242,169,59,0.5);}
    70%{box-shadow:0 0 0 16px rgba(242,169,59,0);}
    100%{box-shadow:0 0 0 0 rgba(242,169,59,0);}
  }
  .player-chip{
    display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface-2);
    border-radius:var(--radius-sm);margin-bottom:6px;font-size:14px;
  }
  @media (max-width:380px){
    .timer-ring{width:180px;height:180px;}
    .code-display{font-size:28px;letter-spacing:4px;}
  }

  /* ===== Folha de QR codes para impressão (substitui o PDF via lib externa) ===== */
  #print-qr-root{ display:none; }
  .print-qr-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:6mm;
  }
  .print-qr-cell{
    border:1px dashed #999;
    border-radius:4px;
    padding:4mm;
    text-align:center;
    break-inside:avoid;
    page-break-inside:avoid;
  }
  .print-qr-cell img{ width:100%; height:auto; display:block; margin:0 auto; }
  .print-qr-loc{ font-family:Arial, sans-serif; font-weight:bold; font-size:13px; color:#000; margin-top:3mm; }

  @media print{
    body *{ visibility:hidden; }
    #print-qr-root, #print-qr-root *{ visibility:visible; }
    #print-qr-root{
      display:block;
      position:absolute; left:0; top:0; width:100%;
      background:#fff; color:#000;
      padding:10mm;
    }
    .print-qr-grid{ grid-template-columns:repeat(3, 1fr); }
    @page{ size:A4; margin:10mm; }
  }
</style>

<script>
/* ===== Carregador de bibliotecas externas com múltiplos CDNs de backup =====
   Usado só para a lib de leitura de câmera (html5-qrcode), que é grande
   e específica de cada navegador/dispositivo. Se o primeiro servidor
   falhar (bloqueio de rede, CDN fora do ar, timeout), tenta o próximo. */
function loadScriptWithFallback(urls, timeoutMs){
  timeoutMs = timeoutMs || 8000;
  return new Promise((resolve, reject)=>{
    let i = 0;
    function tryNext(){
      if(i >= urls.length){
        reject(new Error('Não foi possível carregar de nenhum dos servidores disponíveis.'));
        return;
      }
      const url = urls[i++];
      const s = document.createElement('script');
      s.src = url;
      let settled = false;
      const timer = setTimeout(()=>{
        if(!settled){ settled = true; s.remove(); tryNext(); }
      }, timeoutMs);
      s.onload = ()=>{
        if(!settled){ settled = true; clearTimeout(timer); resolve(); }
      };
      s.onerror = ()=>{
        if(!settled){ settled = true; clearTimeout(timer); s.remove(); tryNext(); }
      };
      document.head.appendChild(s);
    }
    tryNext();
  });
}

let _html5QrLoadPromise = null;
function ensureHtml5Qrcode(){
  if(typeof Html5Qrcode !== 'undefined') return Promise.resolve();
  if(_html5QrLoadPromise) return _html5QrLoadPromise;
  _html5QrLoadPromise = loadScriptWithFallback([
    'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js',
    'https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js'
  ]).then(()=>{
    if(typeof Html5Qrcode === 'undefined'){
      throw new Error('A biblioteca de leitura de câmera carregou mas não inicializou corretamente.');
    }
  }).catch(err=>{
    _html5QrLoadPromise = null;
    throw err;
  });
  return _html5QrLoadPromise;
}
// Começa a carregar em segundo plano assim que a página abre.
ensureHtml5Qrcode().catch(()=>{});
</script>

<script>
/* ===================================================================
   Gerador de QR Code 100% embutido (sem dependência de CDN externo)
   Núcleo: QRCode for JavaScript — Copyright (c) 2009 Kazuhiko Arase
   Licenciado sob MIT: http://www.opensource.org/licenses/mit-license.php
   (mesmo algoritmo usado pela lib "qrcode" que este projeto já usava,
   só que colado direto no arquivo — funciona mesmo sem internet)
   =================================================================== */
(function(global){
var QRMode = {
    MODE_NUMBER :       1 << 0,
    MODE_ALPHA_NUM :    1 << 1,
    MODE_8BIT_BYTE :    1 << 2,
    MODE_KANJI :        1 << 3
};
var QRMaskPattern = {
	PATTERN000 : 0,
	PATTERN001 : 1,
	PATTERN010 : 2,
	PATTERN011 : 3,
	PATTERN100 : 4,
	PATTERN101 : 5,
	PATTERN110 : 6,
	PATTERN111 : 7
};
var QRErrorCorrectLevel = {
	L : 1,
	M : 0,
	Q : 3,
	H : 2
};

var QRMath = {

	glog : function(n) {
	
		if (n < 1) {
			throw new Error("glog(" + n + ")");
		}
		
		return QRMath.LOG_TABLE[n];
	},
	
	gexp : function(n) {
	
		while (n < 0) {
			n += 255;
		}
	
		while (n >= 256) {
			n -= 255;
		}
	
		return QRMath.EXP_TABLE[n];
	},
	
	EXP_TABLE : new Array(256),
	
	LOG_TABLE : new Array(256)

};
	
for (var i = 0; i < 8; i++) {
	QRMath.EXP_TABLE[i] = 1 << i;
}
for (var i = 8; i < 256; i++) {
	QRMath.EXP_TABLE[i] = QRMath.EXP_TABLE[i - 4]
		^ QRMath.EXP_TABLE[i - 5]
		^ QRMath.EXP_TABLE[i - 6]
		^ QRMath.EXP_TABLE[i - 8];
}
for (var i = 0; i < 255; i++) {
	QRMath.LOG_TABLE[QRMath.EXP_TABLE[i] ] = i;
}


function QRPolynomial(num, shift) {
	if (num.length === undefined) {
		throw new Error(num.length + "/" + shift);
	}

	var offset = 0;

	while (offset < num.length && num[offset] === 0) {
		offset++;
	}

	this.num = new Array(num.length - offset + shift);
	for (var i = 0; i < num.length - offset; i++) {
		this.num[i] = num[i + offset];
	}
}

QRPolynomial.prototype = {

	get : function(index) {
		return this.num[index];
	},
	
	getLength : function() {
		return this.num.length;
	},
	
	multiply : function(e) {
	
		var num = new Array(this.getLength() + e.getLength() - 1);
	
		for (var i = 0; i < this.getLength(); i++) {
			for (var j = 0; j < e.getLength(); j++) {
				num[i + j] ^= QRMath.gexp(QRMath.glog(this.get(i) ) + QRMath.glog(e.get(j) ) );
			}
		}
	
		return new QRPolynomial(num, 0);
	},
	
	mod : function(e) {
	
		if (this.getLength() - e.getLength() < 0) {
			return this;
		}
	
		var ratio = QRMath.glog(this.get(0) ) - QRMath.glog(e.get(0) );
	
		var num = new Array(this.getLength() );
		
		for (var i = 0; i < this.getLength(); i++) {
			num[i] = this.get(i);
		}
		
		for (var x = 0; x < e.getLength(); x++) {
			num[x] ^= QRMath.gexp(QRMath.glog(e.get(x) ) + ratio);
		}
	
		// recursive call
		return new QRPolynomial(num, 0).mod(e);
	}
};


function QR8bitByte(data) {
	this.mode = QRMode.MODE_8BIT_BYTE;
	this.data = data;
}

QR8bitByte.prototype = {

	getLength : function() {
		return this.data.length;
	},
	
	write : function(buffer) {
		for (var i = 0; i < this.data.length; i++) {
			// not JIS ...
			buffer.put(this.data.charCodeAt(i), 8);
		}
	}
};

function QRBitBuffer() {
	this.buffer = [];
	this.length = 0;
}

QRBitBuffer.prototype = {

	get : function(index) {
		var bufIndex = Math.floor(index / 8);
		return ( (this.buffer[bufIndex] >>> (7 - index % 8) ) & 1) == 1;
	},
	
	put : function(num, length) {
		for (var i = 0; i < length; i++) {
			this.putBit( ( (num >>> (length - i - 1) ) & 1) == 1);
		}
	},
	
	getLengthInBits : function() {
		return this.length;
	},
	
	putBit : function(bit) {
	
		var bufIndex = Math.floor(this.length / 8);
		if (this.buffer.length <= bufIndex) {
			this.buffer.push(0);
		}
	
		if (bit) {
			this.buffer[bufIndex] |= (0x80 >>> (this.length % 8) );
		}
	
		this.length++;
	}
};


function QRRSBlock(totalCount, dataCount) {
	this.totalCount = totalCount;
	this.dataCount  = dataCount;
}

QRRSBlock.getRSBlocks = function(typeNumber, errorCorrectLevel) {
	
	var rsBlock = QRRSBlock.getRsBlockTable(typeNumber, errorCorrectLevel);
	
	if (rsBlock === undefined) {
		throw new Error("bad rs block @ typeNumber:" + typeNumber + "/errorCorrectLevel:" + errorCorrectLevel);
	}

	var length = rsBlock.length / 3;
	
	var list = [];
	
	for (var i = 0; i < length; i++) {

		var count = rsBlock[i * 3 + 0];
		var totalCount = rsBlock[i * 3 + 1];
		var dataCount  = rsBlock[i * 3 + 2];

		for (var j = 0; j < count; j++) {
			list.push(new QRRSBlock(totalCount, dataCount) );	
		}
	}
	
	return list;
};

QRRSBlock.getRsBlockTable = function(typeNumber, errorCorrectLevel) {

	switch(errorCorrectLevel) {
	case QRErrorCorrectLevel.L :
		return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 0];
	case QRErrorCorrectLevel.M :
		return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 1];
	case QRErrorCorrectLevel.Q :
		return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 2];
	case QRErrorCorrectLevel.H :
		return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 3];
	default :
		return undefined;
	}
};

        [6, 32, 58, 84, 110, 136, 162],
        [6, 26, 54, 82, 110, 138, 166],
        [6, 30, 58, 86, 114, 142, 170]
    ],

    G15 : (1 << 10) | (1 << 8) | (1 << 5) | (1 << 4) | (1 << 2) | (1 << 1) | (1 << 0),
    G18 : (1 << 12) | (1 << 11) | (1 << 10) | (1 << 9) | (1 << 8) | (1 << 5) | (1 << 2) | (1 << 0),
    G15_MASK : (1 << 14) | (1 << 12) | (1 << 10)    | (1 << 4) | (1 << 1),

    getBCHTypeInfo : function(data) {
        var d = data << 10;
        while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15) >= 0) {
            d ^= (QRUtil.G15 << (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15) ) );    
        }
        return ( (data << 10) | d) ^ QRUtil.G15_MASK;
    },

    getBCHTypeNumber : function(data) {
        var d = data << 12;
        while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G18) >= 0) {
            d ^= (QRUtil.G18 << (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G18) ) );    
        }
        return (data << 12) | d;
    },

    getBCHDigit : function(data) {

        var digit = 0;

        while (data !== 0) {
            digit++;
            data >>>= 1;
        }

        return digit;
    },

    getPatternPosition : function(typeNumber) {
        return QRUtil.PATTERN_POSITION_TABLE[typeNumber - 1];
    },

    getMask : function(maskPattern, i, j) {
        
        switch (maskPattern) {
            
        case QRMaskPattern.PATTERN000 : return (i + j) % 2 === 0;
        case QRMaskPattern.PATTERN001 : return i % 2 === 0;
        case QRMaskPattern.PATTERN010 : return j % 3 === 0;
        case QRMaskPattern.PATTERN011 : return (i + j) % 3 === 0;
        case QRMaskPattern.PATTERN100 : return (Math.floor(i / 2) + Math.floor(j / 3) ) % 2 === 0;
        case QRMaskPattern.PATTERN101 : return (i * j) % 2 + (i * j) % 3 === 0;
        case QRMaskPattern.PATTERN110 : return ( (i * j) % 2 + (i * j) % 3) % 2 === 0;
        case QRMaskPattern.PATTERN111 : return ( (i * j) % 3 + (i + j) % 2) % 2 === 0;

        default :
            throw new Error("bad maskPattern:" + maskPattern);
        }
    },

    getErrorCorrectPolynomial : function(errorCorrectLength) {

        var a = new QRPolynomial([1], 0);

        for (var i = 0; i < errorCorrectLength; i++) {
            a = a.multiply(new QRPolynomial([1, QRMath.gexp(i)], 0) );
        }

        return a;
    },

    getLengthInBits : function(mode, type) {

        if (1 <= type && type < 10) {

            // 1 - 9

            switch(mode) {
            case QRMode.MODE_NUMBER     : return 10;
            case QRMode.MODE_ALPHA_NUM  : return 9;
            case QRMode.MODE_8BIT_BYTE  : return 8;
            case QRMode.MODE_KANJI      : return 8;
            default :
                throw new Error("mode:" + mode);
            }

        } else if (type < 27) {

            // 10 - 26

            switch(mode) {
            case QRMode.MODE_NUMBER     : return 12;
            case QRMode.MODE_ALPHA_NUM  : return 11;
            case QRMode.MODE_8BIT_BYTE  : return 16;
            case QRMode.MODE_KANJI      : return 10;
            default :
                throw new Error("mode:" + mode);
            }

        } else if (type < 41) {

            // 27 - 40

            switch(mode) {
            case QRMode.MODE_NUMBER     : return 14;
            case QRMode.MODE_ALPHA_NUM  : return 13;
            case QRMode.MODE_8BIT_BYTE  : return 16;
            case QRMode.MODE_KANJI      : return 12;
            default :
                throw new Error("mode:" + mode);
            }

        } else {
            throw new Error("type:" + type);
        }
    },

    getLostPoint : function(qrCode) {
        
        var moduleCount = qrCode.getModuleCount();
        var lostPoint = 0;
        var row = 0; 
        var col = 0;

        
        // LEVEL1
        
        for (row = 0; row < moduleCount; row++) {

            for (col = 0; col < moduleCount; col++) {

                var sameCount = 0;
                var dark = qrCode.isDark(row, col);

                for (var r = -1; r <= 1; r++) {

                    if (row + r < 0 || moduleCount <= row + r) {
                        continue;
                    }

                    for (var c = -1; c <= 1; c++) {

                        if (col + c < 0 || moduleCount <= col + c) {
                            continue;
                        }

                        if (r === 0 && c === 0) {
                            continue;
                        }

                        if (dark === qrCode.isDark(row + r, col + c) ) {
                            sameCount++;
                        }
                    }
                }

                if (sameCount > 5) {
                    lostPoint += (3 + sameCount - 5);
                }
            }
        }

        // LEVEL2

        for (row = 0; row < moduleCount - 1; row++) {
            for (col = 0; col < moduleCount - 1; col++) {
                var count = 0;
                if (qrCode.isDark(row,     col    ) ) count++;
                if (qrCode.isDark(row + 1, col    ) ) count++;
                if (qrCode.isDark(row,     col + 1) ) count++;
                if (qrCode.isDark(row + 1, col + 1) ) count++;
                if (count === 0 || count === 4) {
                    lostPoint += 3;
                }
            }
        }

        // LEVEL3

        for (row = 0; row < moduleCount; row++) {
            for (col = 0; col < moduleCount - 6; col++) {
                if (qrCode.isDark(row, col) && 
                        !qrCode.isDark(row, col + 1) && 
                         qrCode.isDark(row, col + 2) && 
                         qrCode.isDark(row, col + 3) && 
                         qrCode.isDark(row, col + 4) && 
                        !qrCode.isDark(row, col + 5) && 
                         qrCode.isDark(row, col + 6) ) {
                    lostPoint += 40;
                }
            }
        }

        for (col = 0; col < moduleCount; col++) {
            for (row = 0; row < moduleCount - 6; row++) {
                if (qrCode.isDark(row, col) &&
                        !qrCode.isDark(row + 1, col) &&
                         qrCode.isDark(row + 2, col) &&
                         qrCode.isDark(row + 3, col) &&
                         qrCode.isDark(row + 4, col) &&
                        !qrCode.isDark(row + 5, col) &&
                         qrCode.isDark(row + 6, col) ) {
                    lostPoint += 40;
                }
            }
        }

        // LEVEL4
        
        var darkCount = 0;

        for (col = 0; col < moduleCount; col++) {
            for (row = 0; row < moduleCount; row++) {
                if (qrCode.isDark(row, col) ) {
                    darkCount++;
                }
            }
        }
        
        var ratio = Math.abs(100 * darkCount / moduleCount / moduleCount - 50) / 5;
        lostPoint += ratio * 10;

        return lostPoint;       
    }

};

function QRCodeModel(typeNumber, errorCorrectLevel) {
	this.typeNumber = typeNumber;
	this.errorCorrectLevel = errorCorrectLevel;
	this.modules = null;
	this.moduleCount = 0;
	this.dataCache = null;
	this.dataList = [];
}

QRCodeModel.prototype = {
	
	addData : function(data) {
		var newData = new QR8bitByte(data);
		this.dataList.push(newData);
		this.dataCache = null;
	},
	
	isDark : function(row, col) {
		if (row < 0 || this.moduleCount <= row || col < 0 || this.moduleCount <= col) {
			throw new Error(row + "," + col);
		}
		return this.modules[row][col];
	},

	getModuleCount : function() {
		return this.moduleCount;
	},
	
	make : function() {
		// Calculate automatically typeNumber if provided is < 1
		if (this.typeNumber < 1 ){
			var typeNumber = 1;
			for (typeNumber = 1; typeNumber < 40; typeNumber++) {
				var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, this.errorCorrectLevel);

				var buffer = new QRBitBuffer();
				var totalDataCount = 0;
				for (var i = 0; i < rsBlocks.length; i++) {
					totalDataCount += rsBlocks[i].dataCount;
				}

				for (var x = 0; x < this.dataList.length; x++) {
					var data = this.dataList[x];
					buffer.put(data.mode, 4);
					buffer.put(data.getLength(), QRUtil.getLengthInBits(data.mode, typeNumber) );
					data.write(buffer);
				}
				if (buffer.getLengthInBits() <= totalDataCount * 8)
					break;
			}
			this.typeNumber = typeNumber;
		}
		this.makeImpl(false, this.getBestMaskPattern() );
	},
	
	makeImpl : function(test, maskPattern) {
		
		this.moduleCount = this.typeNumber * 4 + 17;
		this.modules = new Array(this.moduleCount);
		
		for (var row = 0; row < this.moduleCount; row++) {
			
			this.modules[row] = new Array(this.moduleCount);
			
			for (var col = 0; col < this.moduleCount; col++) {
				this.modules[row][col] = null;//(col + row) % 3;
			}
		}
	
		this.setupPositionProbePattern(0, 0);
		this.setupPositionProbePattern(this.moduleCount - 7, 0);
		this.setupPositionProbePattern(0, this.moduleCount - 7);
		this.setupPositionAdjustPattern();
		this.setupTimingPattern();
		this.setupTypeInfo(test, maskPattern);
		
		if (this.typeNumber >= 7) {
			this.setupTypeNumber(test);
		}
	
		if (this.dataCache === null) {
			this.dataCache = QRCodeModel.createData(this.typeNumber, this.errorCorrectLevel, this.dataList);
		}
	
		this.mapData(this.dataCache, maskPattern);
	},

	setupPositionProbePattern : function(row, col)  {
		
		for (var r = -1; r <= 7; r++) {
			
			if (row + r <= -1 || this.moduleCount <= row + r) continue;
			
			for (var c = -1; c <= 7; c++) {
				
				if (col + c <= -1 || this.moduleCount <= col + c) continue;
				
				if ( (0 <= r && r <= 6 && (c === 0 || c === 6) ) || 
                     (0 <= c && c <= 6 && (r === 0 || r === 6) ) || 
                     (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
					this.modules[row + r][col + c] = true;
				} else {
					this.modules[row + r][col + c] = false;
				}
			}		
		}		
	},
	
	getBestMaskPattern : function() {
	
		var minLostPoint = 0;
		var pattern = 0;
	
		for (var i = 0; i < 8; i++) {
			
			this.makeImpl(true, i);
	
			var lostPoint = QRUtil.getLostPoint(this);
	
			if (i === 0 || minLostPoint >  lostPoint) {
				minLostPoint = lostPoint;
				pattern = i;
			}
		}
	
		return pattern;
	},
	
	createMovieClip : function(target_mc, instance_name, depth) {
	
		var qr_mc = target_mc.createEmptyMovieClip(instance_name, depth);
		var cs = 1;
	
		this.make();

		for (var row = 0; row < this.modules.length; row++) {
			
			var y = row * cs;
			
			for (var col = 0; col < this.modules[row].length; col++) {
	
				var x = col * cs;
				var dark = this.modules[row][col];
			
				if (dark) {
					qr_mc.beginFill(0, 100);
					qr_mc.moveTo(x, y);
					qr_mc.lineTo(x + cs, y);
					qr_mc.lineTo(x + cs, y + cs);
					qr_mc.lineTo(x, y + cs);
					qr_mc.endFill();
				}
			}
		}
		
		return qr_mc;
	},

	setupTimingPattern : function() {
		
		for (var r = 8; r < this.moduleCount - 8; r++) {
			if (this.modules[r][6] !== null) {
				continue;
			}
			this.modules[r][6] = (r % 2 === 0);
		}
	
		for (var c = 8; c < this.moduleCount - 8; c++) {
			if (this.modules[6][c] !== null) {
				continue;
			}
			this.modules[6][c] = (c % 2 === 0);
		}
	},
	
	setupPositionAdjustPattern : function() {
	
		var pos = QRUtil.getPatternPosition(this.typeNumber);
		
		for (var i = 0; i < pos.length; i++) {
		
			for (var j = 0; j < pos.length; j++) {
			
				var row = pos[i];
				var col = pos[j];
				
				if (this.modules[row][col] !== null) {
					continue;
				}
				
				for (var r = -2; r <= 2; r++) {
				
					for (var c = -2; c <= 2; c++) {
					
						if (Math.abs(r) === 2 || 
                            Math.abs(c) === 2 ||
                            (r === 0 && c === 0) ) {
							this.modules[row + r][col + c] = true;
						} else {
							this.modules[row + r][col + c] = false;
						}
					}
				}
			}
		}
	},
	
	setupTypeNumber : function(test) {
	
		var bits = QRUtil.getBCHTypeNumber(this.typeNumber);
        var mod;
	
		for (var i = 0; i < 18; i++) {
			mod = (!test && ( (bits >> i) & 1) === 1);
			this.modules[Math.floor(i / 3)][i % 3 + this.moduleCount - 8 - 3] = mod;
		}
	
		for (var x = 0; x < 18; x++) {
			mod = (!test && ( (bits >> x) & 1) === 1);
			this.modules[x % 3 + this.moduleCount - 8 - 3][Math.floor(x / 3)] = mod;
		}
	},
	
	setupTypeInfo : function(test, maskPattern) {
	
		var data = (this.errorCorrectLevel << 3) | maskPattern;
		var bits = QRUtil.getBCHTypeInfo(data);
        var mod;
	
		// vertical		
		for (var v = 0; v < 15; v++) {
	
			mod = (!test && ( (bits >> v) & 1) === 1);
	
			if (v < 6) {
				this.modules[v][8] = mod;
			} else if (v < 8) {
				this.modules[v + 1][8] = mod;
			} else {
				this.modules[this.moduleCount - 15 + v][8] = mod;
			}
		}
	
		// horizontal
		for (var h = 0; h < 15; h++) {
	
			mod = (!test && ( (bits >> h) & 1) === 1);
			
			if (h < 8) {
				this.modules[8][this.moduleCount - h - 1] = mod;
			} else if (h < 9) {
				this.modules[8][15 - h - 1 + 1] = mod;
			} else {
				this.modules[8][15 - h - 1] = mod;
			}
		}
	
		// fixed module
		this.modules[this.moduleCount - 8][8] = (!test);
	
	},
	
	mapData : function(data, maskPattern) {
		
		var inc = -1;
		var row = this.moduleCount - 1;
		var bitIndex = 7;
		var byteIndex = 0;
		
		for (var col = this.moduleCount - 1; col > 0; col -= 2) {
	
			if (col === 6) col--;
	
			while (true) {
	
				for (var c = 0; c < 2; c++) {
					
					if (this.modules[row][col - c] === null) {
						
						var dark = false;
	
						if (byteIndex < data.length) {
							dark = ( ( (data[byteIndex] >>> bitIndex) & 1) === 1);
						}
	
						var mask = QRUtil.getMask(maskPattern, row, col - c);
	
						if (mask) {
							dark = !dark;
						}
						
						this.modules[row][col - c] = dark;
						bitIndex--;
	
						if (bitIndex === -1) {
							byteIndex++;
							bitIndex = 7;
						}
					}
				}
								
				row += inc;
	
				if (row < 0 || this.moduleCount <= row) {
					row -= inc;
					inc = -inc;
					break;
				}
			}
		}
		
	}

};

QRCodeModel.PAD0 = 0xEC;
QRCodeModel.PAD1 = 0x11;

QRCodeModel.createData = function(typeNumber, errorCorrectLevel, dataList) {
	
	var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectLevel);
	
	var buffer = new QRBitBuffer();
	
	for (var i = 0; i < dataList.length; i++) {
		var data = dataList[i];
		buffer.put(data.mode, 4);
		buffer.put(data.getLength(), QRUtil.getLengthInBits(data.mode, typeNumber) );
		data.write(buffer);
	}

	// calc num max data.
	var totalDataCount = 0;
	for (var x = 0; x < rsBlocks.length; x++) {
		totalDataCount += rsBlocks[x].dataCount;
	}

	if (buffer.getLengthInBits() > totalDataCount * 8) {
		throw new Error("code length overflow. (" + 
            buffer.getLengthInBits() + 
            ">" +  
            totalDataCount * 8 + 
            ")");
	}

	// end code
	if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
		buffer.put(0, 4);
	}

	// padding
	while (buffer.getLengthInBits() % 8 !== 0) {
		buffer.putBit(false);
	}

	// padding
	while (true) {
		
		if (buffer.getLengthInBits() >= totalDataCount * 8) {
			break;
		}
		buffer.put(QRCodeModel.PAD0, 8);
		
		if (buffer.getLengthInBits() >= totalDataCount * 8) {
			break;
		}
		buffer.put(QRCodeModel.PAD1, 8);
	}

	return QRCodeModel.createBytes(buffer, rsBlocks);
};

QRCodeModel.createBytes = function(buffer, rsBlocks) {

	var offset = 0;
	
	var maxDcCount = 0;
	var maxEcCount = 0;
	
	var dcdata = new Array(rsBlocks.length);
	var ecdata = new Array(rsBlocks.length);
	
	for (var r = 0; r < rsBlocks.length; r++) {

		var dcCount = rsBlocks[r].dataCount;
		var ecCount = rsBlocks[r].totalCount - dcCount;

		maxDcCount = Math.max(maxDcCount, dcCount);
		maxEcCount = Math.max(maxEcCount, ecCount);
		
		dcdata[r] = new Array(dcCount);
		
		for (var i = 0; i < dcdata[r].length; i++) {
			dcdata[r][i] = 0xff & buffer.buffer[i + offset];
		}
		offset += dcCount;
		
		var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
		var rawPoly = new QRPolynomial(dcdata[r], rsPoly.getLength() - 1);

		var modPoly = rawPoly.mod(rsPoly);
		ecdata[r] = new Array(rsPoly.getLength() - 1);
		for (var x = 0; x < ecdata[r].length; x++) {
            var modIndex = x + modPoly.getLength() - ecdata[r].length;
			ecdata[r][x] = (modIndex >= 0)? modPoly.get(modIndex) : 0;
		}

	}
	
	var totalCodeCount = 0;
	for (var y = 0; y < rsBlocks.length; y++) {
		totalCodeCount += rsBlocks[y].totalCount;
	}

	var data = new Array(totalCodeCount);
	var index = 0;

	for (var z = 0; z < maxDcCount; z++) {
		for (var s = 0; s < rsBlocks.length; s++) {
			if (z < dcdata[s].length) {
				data[index++] = dcdata[s][z];
			}
		}
	}

	for (var xx = 0; xx < maxEcCount; xx++) {
		for (var t = 0; t < rsBlocks.length; t++) {
			if (xx < ecdata[t].length) {
				data[index++] = ecdata[t][xx];
			}
		}
	}

	return data;

};


/* Wrapper compatível com a API que o app já usa:
   QRCode.toCanvas(canvas, text, { width, margin }, callback) */
function toCanvas(canvas, text, options, callback){
  if (typeof options === 'function'){ callback = options; options = {}; }
  options = options || {};
  try{
    var margin = (options.margin != null) ? options.margin : 4;
    var targetWidth = options.width || 256;
    var qr = new QRCodeModel(0, QRErrorCorrectLevel.M);
    qr.addData(String(text));
    qr.make();
    var moduleCount = qr.getModuleCount();
    var cellSize = Math.max(1, Math.floor(targetWidth / (moduleCount + margin*2)));
    var size = cellSize * (moduleCount + margin*2);
    canvas.width = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#000000';
    for (var row=0; row<moduleCount; row++){
      for (var col=0; col<moduleCount; col++){
        if (qr.isDark(row,col)){
          ctx.fillRect((col+margin)*cellSize, (row+margin)*cellSize, cellSize, cellSize);
        }
      }
    }
    if (callback) callback(null, canvas);
    return canvas;
  }catch(err){
    if (callback){ callback(err); return; }
    throw err;
  }
}

global.QRCode = { toCanvas: toCanvas, ErrorCorrectLevel: QRErrorCorrectLevel };

function qrCanvas(text, size){
  return new Promise((resolve, reject)=>{
    const canvas = document.createElement('canvas');
    QRCode.toCanvas(canvas, text, { width: size, margin: 1 }, (err)=>{
      if(err) reject(err); else resolve(canvas);
    });
  });
}

function generateQrPdf(match){
  const tasks = Object.entries(match.taskBank || {});
  if(tasks.length === 0){ throw new Error('Nenhuma tarefa cadastrada.'); }
  return buildPrintableQrSheet(match, tasks).then(()=>{
    window.print();

  const grid = document.createElement('div');
  grid.className = 'print-qr-grid';
  printRoot.appendChild(grid);

  for(let i=0; i<tasks.length; i++){
    const [, t] = tasks[i];
    const location = t.location || '';
    const qrText = t.qrCode || `AMONGUVIRE|${match.roomCodeHint||''}|${i}`;

    const canvas = await qrCanvas(qrText, 300);

    const cell = document.createElement('div');
    cell.className = 'print-qr-cell';

    img.src = canvas.toDataURL('image/png');

    locEl.textContent = location;

  $app.appendChild(el(`
    <div>
      <div class="top-nav">
        <button class="back-link" id="exit">sair do console</button>
        <span class="tag">SALA ${roomCode}</span>
      </div>
      <div class="header-block">
        <div class="eyebrow">${isEnded ? 'Partida encerrada' : 'Partida em andamento'}</div>
        <h2>${match.name}</h2>
      </div>
      <div id="dash-players"></div>
      ${isEnded ? '' : '<button class="btn-danger btn-block" id="end-btn" style="margin-top:8px;">Encerrar partida</button>'}
    </div>
  `));
  document.getElementById('exit').onclick = ()=>{ detachMatchListener(); clearSession(); goHome(); };

  const dashEl = document.getElementById('dash-players');
  if(pEntries.length===0){
    dashEl.appendChild(el(`<p class="muted">Nenhum jogador nesta partida.</p>`));
  }
  pEntries
    .map(([pid,p])=>{
      const tasks = p.tasks || {};
      const tVals = Object.values(tasks);
      const total = tVals.length;
      const done = tVals.filter(t=>t.status==='completed').length;
      return {pid, p, total, done};
    })
    .sort((a,b)=> b.done - a.done)
    .forEach(({pid,p,total,done})=>{
      const card = el(`
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-weight:600;font-family:var(--font-display);">${p.name}</div>
              <div class="muted" style="font-size:13px;">${done}/${total} tarefas concluídas · ${p.score||0} pts</div>
            </div>
          </div>
        </div>
      `);
      dashEl.appendChild(card);
    });

  if(!isEnded){
    document.getElementById('end-btn').onclick = async ()=>{
      await update(ref(db, `matches/${roomCode}`), { status:'ended', endedAt: Date.now() });
    };
  }
}

/* ================= PLAYER: JOIN ================= */
function renderPlayerJoin(){
  $app.innerHTML='';
  $app.appendChild(el(`
    <div>
      <div class="top-nav"><button class="back-link" id="back">← voltar</button></div>
      <div class="header-block"><div class="eyebrow">Entrar na partida</div><h2>Identifique-se</h2></div>
      <div class="card">
        <div class="field"><label>Seu nome</label><input id="f-name" placeholder="Como devemos te chamar?"></div>
        <div class="field"><label>Código da sala</label><input id="f-code" placeholder="EX: A1B2C" style="text-transform:uppercase;letter-spacing:2px;"></div>
        <div id="err" class="error-msg" style="display:none;"></div>
        <button class="btn-primary btn-block" id="join-btn">Entrar</button>
      </div>
    </div>
  `));
  document.getElementById('back').onclick = renderHome;
  document.getElementById('join-btn').onclick = async ()=>{
    const name = document.getElementById('f-name').value.trim();
    const code = document.getElementById('f-code').value.trim().toUpperCase();
    const errBox = document.getElementById('err');
    if(!name){ errBox.textContent='Digite seu nome.'; errBox.style.display='block'; return; }
    if(!code){ errBox.textContent='Digite o código da sala.'; errBox.style.display='block'; return; }

    const snap = await get(ref(db, `matches/${code}`));
    if(!snap.exists()){ errBox.textContent='Sala não encontrada. Confira o código.'; errBox.style.display='block'; return; }
    const match = snap.val();
    if(match.status !== 'waiting'){ errBox.textContent='Esta partida já começou ou foi encerrada.'; errBox.style.display='block'; return; }
    const currentPlayers = Object.keys(match.players||{}).length;
    if(currentPlayers >= match.totalPlayers){ errBox.textContent='A sala já atingiu o número máximo de jogadores.'; errBox.style.display='block'; return; }

    const pid = uid();
    await set(ref(db, `matches/${code}/players/${pid}`), { name, joinedAt: Date.now(), score: 0, tasks: {} });
    S.role='player'; S.roomCode=code; S.playerId=pid;
    saveSession({role:'player', roomCode:code, playerId:pid});
    enterPlayerFlow(code, pid);
  };
}

/* ================= PLAYER: MAIN FLOW ================= */
function enterPlayerFlow(roomCode, playerId){
  attachMatchListener(roomCode, (match)=>{
    if(!match){ showToast('Esta partida não existe mais.','danger'); clearSession(); goHome(); return; }
    const me = (match.players||{})[playerId];
    if(!me){ showToast('Você não está mais nesta partida.','danger'); clearSession(); goHome(); return; }

    if(match.status === 'waiting'){ renderPlayerWaiting(match); return; }
    if(match.status === 'ended'){ renderPlayerFinal(roomCode, playerId, match); return; }

    // active
    if(S.currentPlayerView === 'scan') return; // don't yank the camera view on every tick
    if(S.currentPlayerView === 'task' && S.activeTaskId){
      const t = (me.tasks||{})[S.activeTaskId];
      if(t && t.status === 'in_progress'){ return; } // timer screen manages itself
    }
    renderPlayerTaskList(roomCode, playerId, match);
  });
}

function renderPlayerWaiting(match){
  S.currentPlayerView = 'waiting';
  $app.innerHTML='';
  $app.appendChild(el(`
    <div style="display:flex;flex-direction:column;min-height:80vh;justify-content:center;align-items:center;text-align:center;">
      <span class="waiting-pulse" style="margin-bottom:22px;"></span>
      <div class="eyebrow" style="justify-content:center;">${match.name}</div>
      <h2 style="margin-bottom:10px;">Aguardando o início</h2>
      <p>O administrador vai iniciar a partida em breve. Fique com o app aberto.</p>
      <button class="btn-ghost" id="leave" style="margin-top:24px;">Sair da sala</button>
    </div>
  `));
  document.getElementById('leave').onclick = ()=>{ detachMatchListener(); clearSession(); goHome(); };
}

function renderPlayerTaskList(roomCode, playerId, match){
  S.currentPlayerView = 'list';
  const me = match.players[playerId];
  const tasks = me.tasks || {};
  const entries = Object.entries(tasks);
  const done = entries.filter(([,t])=>t.status==='completed').length;
  const remaining = entries.length - done;

  $app.innerHTML='';
  $app.appendChild(el(`
    <div>
      <div class="top-nav">
        <span class="eyebrow" style="margin:0;">${match.name}</span>
        <button class="back-link" id="leave">sair</button>
      </div>
      <div class="header-block"><h2>${me.name}</h2></div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num" style="color:var(--ok);">${done}</div><div class="stat-label">Concluídas</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--accent);">${remaining}</div><div class="stat-label">Restantes</div></div>
      </div>
      <div id="task-items"></div>
    </div>
  `));
  document.getElementById('leave').onclick = ()=>{ detachMatchListener(); clearSession(); goHome(); };

  const itemsEl = document.getElementById('task-items');
  if(entries.length===0){
    itemsEl.appendChild(el(`<div class="empty-state"><div class="big-emoji">📭</div>Nenhuma tarefa atribuída.</div>`));
  }
  entries.forEach(([taskId, t])=>{
    const bank = (match.taskBank||{})[taskId] || {name:'Tarefa', location:'—'};
    const statusInfo = t.status==='completed'
      ? {icon:'✓', cls:'done', pill:'pill-done', label:'Concluída'}
      : t.status==='in_progress'
      ? {icon:'⏱', cls:'active', pill:'pill-progress', label:'Em andamento'}
      : {icon:'', cls:'', pill:'pill-wait', label:'Não iniciada'};
    const row = el(`
      <div class="task-item ${t.status==='completed'?'done':''} ${t.status==='in_progress'?'active-task':''}">
        <div class="task-check ${statusInfo.cls}">${statusInfo.icon}</div>
        <div style="flex:1;">
          <div class="task-name">${bank.name}</div>
          <div class="task-loc">📍 ${bank.location}</div>
        </div>
        <div class="status-pill ${statusInfo.pill}">${statusInfo.label}</div>
      </div>
    `);
    row.onclick = ()=>{
      if(t.status==='completed') return;
      if(t.status==='in_progress'){ renderPlayerTaskRun(roomCode, playerId, taskId); return; }
      renderPlayerScanIntro(roomCode, playerId, taskId, bank);
    };
    itemsEl.appendChild(row);
  });
}

function renderPlayerScanIntro(roomCode, playerId, taskId, bank){
  S.currentPlayerView = 'list';
  $app.innerHTML='';
  $app.appendChild(el(`
    <div>
      <div class="top-nav"><button class="back-link" id="back">← voltar</button></div>
      <div class="header-block"><div class="eyebrow">📍 ${bank.location}</div><h2>${bank.name}</h2></div>
      <div class="card">
        <p>Vá até o local indicado e escaneie o QR Code para iniciar esta tarefa.</p>
      </div>
      <button class="btn-primary btn-block" id="scan-btn">Escanear QR Code</button>
      <button class="btn-secondary btn-block" id="notfound-btn" style="margin-top:10px;">Não encontrei o QR Code</button>
    </div>
  `));
  document.getElementById('back').onclick = ()=> refreshPlayerList(roomCode, playerId);
  document.getElementById('scan-btn').onclick = ()=> renderPlayerScan(roomCode, playerId);
  document.getElementById('notfound-btn').onclick = ()=> renderPlayerFallbackSelect(roomCode, playerId);
}

async function refreshPlayerList(roomCode, playerId){
  const snap = await get(ref(db, `matches/${roomCode}`));
  if(snap.exists()) renderPlayerTaskList(roomCode, playerId, snap.val());
}

function renderPlayerScan(roomCode, playerId){
  S.currentPlayerView = 'scan';
  $app.innerHTML='';
  $app.appendChild(el(`
    <div>
      <div class="top-nav"><button class="back-link" id="back">← cancelar</button></div>
      <div class="header-block"><div class="eyebrow">Escaneando</div><h2>Aponte para o QR Code</h2></div>
      <div class="scan-frame"><div id="reader"></div></div>
      <p class="muted" style="text-align:center;">O código deve estar no local físico da tarefa.</p>
    </div>
  `));

  const stopScanner = async ()=>{
    if(S.scanner){
      try{ await S.scanner.stop(); S.scanner.clear(); }catch(e){}
      S.scanner = null;
    }
  };

  document.getElementById('back').onclick = async ()=>{
    await stopScanner();
    refreshPlayerList(roomCode, playerId);
  };

  ensureHtml5Qrcode().then(()=>{
    S.scanner = new Html5Qrcode("reader");
    S.scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 240, height: 240 } },
      async (decodedText)=>{
        await stopScanner();
        handleScanResult(roomCode, playerId, decodedText);
      },
      ()=>{ /* per-frame scan errors, ignore */ }
    ).catch((err)=>{
      showToast('Não foi possível acessar a câmera. Verifique as permissões.','danger');
      refreshPlayerList(roomCode, playerId);
    });
  }).catch(()=>{
    showToast('Não foi possível carregar o leitor de câmera. Verifique sua conexão.','danger');
    refreshPlayerList(roomCode, playerId);
  });
}

async function handleScanResult(roomCode, playerId, decodedText){
  const parts = String(decodedText).split('|');
  if(parts.length !== 3 || parts[0] !== APP_TAG){
    showToast('Este QR Code não pertence a este jogo.','danger');
    refreshPlayerList(roomCode, playerId);
    return;
  }
  const [, scannedRoom, taskId] = parts;
  if(scannedRoom !== roomCode){
    showToast('Este QR Code é de outra sala.','danger');
    refreshPlayerList(roomCode, playerId);
    return;
  }
  const snap = await get(ref(db, `matches/${roomCode}/players/${playerId}/tasks/${taskId}`));
  if(!snap.exists()){
    showToast('Este QR Code não corresponde a nenhuma das suas tarefas.','danger');
    refreshPlayerList(roomCode, playerId);
    return;
  }
  const t = snap.val();
  if(t.status !== 'not_started'){
    showToast('Esta tarefa já foi iniciada ou concluída.','danger');
    refreshPlayerList(roomCode, playerId);
    return;
  }
  await startTask(roomCode, playerId, taskId, false);
  renderPlayerTaskRun(roomCode, playerId, taskId);
}

function renderPlayerFallbackSelect(roomCode, playerId){
  S.currentPlayerView = 'list';
  get(ref(db, `matches/${roomCode}`)).then(snap=>{
    const match = snap.val();
    const me = match.players[playerId];
    const entries = Object.entries(me.tasks||{}).filter(([,t])=>t.status==='not_started');

    $app.innerHTML='';
    $app.appendChild(el(`
      <div>
        <div class="top-nav"><button class="back-link" id="back">← voltar</button></div>
        <div class="header-block"><div class="eyebrow">Sem QR Code</div><h2>Qual tarefa você estava tentando fazer?</h2></div>
        <div class="card" style="border-color:rgba(226,85,74,0.35);">
          <p style="color:#ffb3ad;">⚠ Um acréscimo de 10 segundos será aplicado ao tempo desta tarefa.</p>
        </div>
        <div id="fallback-list"></div>
      </div>
    `));
    document.getElementById('back').onclick = ()=> refreshPlayerList(roomCode, playerId);
    const list = document.getElementById('fallback-list');
    if(entries.length===0){
      list.appendChild(el(`<p class="muted">Nenhuma tarefa pendente.</p>`));
    }
    entries.forEach(([taskId])=>{
      const bank = (match.taskBank||{})[taskId] || {name:'Tarefa', location:'—'};
      const row = el(`
        <div class="task-item">
          <div style="flex:1;">
            <div class="task-name">${bank.name}</div>
            <div class="task-loc">📍 ${bank.location}</div>
          </div>
        </div>
      `);
      row.onclick = async ()=>{
        await startTask(roomCode, playerId, taskId, true);
        renderPlayerTaskRun(roomCode, playerId, taskId);
      };
      list.appendChild(row);
    });
  });
}

async function startTask(roomCode, playerId, taskId, penalty){
  const bankSnap = await get(ref(db, `matches/${roomCode}/taskBank/${taskId}`));
  const bank = bankSnap.val();
  const duration = bank.duration + (penalty ? 10 : 0);
  await update(ref(db, `matches/${roomCode}/players/${playerId}/tasks/${taskId}`), {
    status: 'in_progress',
    startedAt: Date.now(),
    duration,
    penalty: !!penalty
  });
}

function renderPlayerTaskRun(roomCode, playerId, taskId){
  S.currentPlayerView = 'task';
  S.activeTaskId = taskId;

  get(ref(db, `matches/${roomCode}`)).then(snap=>{
    const match = snap.val();
    const bank = match.taskBank[taskId];
    const pTask = match.players[playerId].tasks[taskId];
    const durationMs = pTask.duration * 1000;
    const startedAt = pTask.startedAt;

    $app.innerHTML='';
    $app.appendChild(el(`
      <div>
        <div class="header-block"><div class="eyebrow">📍 ${bank.location}${pTask.penalty ? ' · +10s aplicado' : ''}</div><h2>${bank.name}</h2></div>
        ${bank.description ? `<p style="margin-bottom:14px;">${bank.description}</p>` : ''}
        <div class="timer-wrap">
          <div class="timer-ring">
            <svg viewBox="0 0 120 120">
              <circle class="bg-ring" cx="60" cy="60" r="52"></circle>
              <circle class="fg-ring" id="fg-ring" cx="60" cy="60" r="52"></circle>
            </svg>
            <div class="timer-center">
              <div class="timer-num" id="timer-num">--:--</div>
              <div class="timer-sub">restante</div>
            </div>
          </div>
        </div>
        <p class="muted" style="text-align:center;margin-top:8px;">Aguarde o tempo terminar. A tarefa será concluída automaticamente.</p>
      </div>
    `));

    const circumference = 2 * Math.PI * 52;
    const fgRing = document.getElementById('fg-ring');
    fgRing.style.strokeDasharray = `${circumference}`;
    const timerNum = document.getElementById('timer-num');

    if(S.taskTimerInterval) clearInterval(S.taskTimerInterval);

    const tick = async ()=>{
      const elapsed = Date.now() - startedAt;
      const remainingMs = durationMs - elapsed;
      if(remainingMs <= 0){
        clearInterval(S.taskTimerInterval);
        S.taskTimerInterval = null;
        await completeTask(roomCode, playerId, taskId);
        renderTaskComplete(roomCode, playerId);
        return;
      }
      timerNum.textContent = fmtDuration(remainingMs);
      const frac = remainingMs / durationMs;
      fgRing.style.strokeDashoffset = `${circumference * (1-frac)}`;
    };
    tick();
    S.taskTimerInterval = setInterval(tick, 250);
  });
}

async function completeTask(roomCode, playerId, taskId){
  await update(ref(db, `matches/${roomCode}/players/${playerId}/tasks/${taskId}`), {
    status: 'completed',
    completedAt: Date.now()
  });
  await runTransaction(ref(db, `matches/${roomCode}/players/${playerId}/score`), (cur)=> (cur||0) + 100);
}

function renderTaskComplete(roomCode, playerId){
  S.currentPlayerView = 'list';
  S.activeTaskId = null;
  $app.innerHTML='';
  $app.appendChild(el(`
    <div style="display:flex;flex-direction:column;min-height:70vh;justify-content:center;align-items:center;text-align:center;">
      <div style="font-size:52px;margin-bottom:16px;">✓</div>
      <h2 style="color:var(--ok);margin-bottom:8px;">Tarefa concluída com sucesso.</h2>
      <p>Voltando para sua lista de tarefas…</p>
    </div>
  `));
  setTimeout(()=> refreshPlayerList(roomCode, playerId), 1600);
}

/* ================= PLAYER: FINAL RESULTS ================= */
function renderPlayerFinal(roomCode, playerId, match){
  S.currentPlayerView = 'final';
  const players = match.players || {};
  const me = players[playerId];
  const meTasks = Object.entries(me.tasks||{});
  const done = meTasks.filter(([,t])=>t.status==='completed');
  const notDone = meTasks.filter(([,t])=>t.status!=='completed');
  const totalMatchMs = (match.endedAt||Date.now()) - (match.startedAt||match.createdAt);

  const ranking = Object.entries(players).map(([pid,p])=>{
    const tVals = Object.values(p.tasks||{});
    const completedVals = tVals.filter(t=>t.status==='completed');
    const totalTime = completedVals.reduce((sum,t)=> sum + ((t.completedAt||0)-(t.startedAt||0)), 0);
    return { pid, name:p.name, score:p.score||0, done:completedVals.length, totalTime };
  }).sort((a,b)=> b.score - a.score || a.totalTime - b.totalTime);

  $app.innerHTML='';
  $app.appendChild(el(`
    <div>
      <div class="header-block" style="text-align:center;margin-top:2vh;">
        <div class="eyebrow" style="justify-content:center;">Partida encerrada</div>
        <h2>${match.name}</h2>
      </div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num" style="color:var(--ok);">${done.length}</div><div class="stat-label">Concluídas</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--danger);">${notDone.length}</div><div class="stat-label">Não concluídas</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--accent);">${me.score||0}</div><div class="stat-label">Pontos</div></div>
      </div>
      <div class="card">
        <div class="muted" style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Tempo total da partida</div>
        <div style="font-family:var(--font-mono);font-size:22px;">${fmtTime(totalMatchMs/1000)}</div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:10px;">Suas tarefas</h3>
        <div id="my-tasks"></div>
      </div>
      <div class="header-block"><h3 style="font-size:16px;">Ranking</h3></div>
      <div id="ranking-list"></div>
      <button class="btn-secondary btn-block" id="leave" style="margin-top:16px;">Sair</button>
    </div>
  `));
  document.getElementById('leave').onclick = ()=>{ detachMatchListener(); clearSession(); goHome(); };

  const myTasksEl = document.getElementById('my-tasks');
  meTasks.forEach(([taskId,t])=>{
    const bank = (match.taskBank||{})[taskId] || {name:'Tarefa'};
    const timeStr = t.status==='completed' ? fmtDuration((t.completedAt||0)-(t.startedAt||0)) : '—';
    myTasksEl.appendChild(el(`
      <div class="task-bank-row">
        <div style="flex:1;">
          <div class="tbr-name">${t.status==='completed'?'✓':'✕'} ${bank.name}</div>
          <div class="tbr-meta">${t.status==='completed' ? 'concluída em ' + timeStr : 'não concluída'}</div>
        </div>
      </div>
    `));
  });

  const rankEl = document.getElementById('ranking-list');
  ranking.forEach((r, i)=>{
    rankEl.appendChild(el(`
      <div class="rank-row ${r.pid===playerId?'me':''} pos-${i+1}">
        <div class="rank-pos">${i+1}</div>
        <div style="flex:1;">
          <div style="font-weight:600;">${r.name}${r.pid===playerId?' (você)':''}</div>
          <div class="muted" style="font-size:12.5px;">${r.done} tarefas · ${fmtTime(r.totalTime/1000)}</div>
        </div>
        <div style="font-family:var(--font-mono);font-weight:700;color:var(--accent);">${r.score}</div>
      </div>
    `));
  });
}

/* ================= INIT ================= */
renderHome();
</script>
</body>
</html>
